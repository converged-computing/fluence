# Native gang scheduling (k8s >= 1.35, GangScheduling/GenericWorkload gates on).
# Fluence does placement; the PodGroup gives all-or-nothing semantics.
apiVersion: scheduling.k8s.io/v1alpha2
kind: PodGroup
metadata:
  name: training
  namespace: default
spec:
  schedulingPolicy:
    gang:
      minCount: 2
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: training
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels: {app: training}
  template:
    metadata:
      labels:
        app: training
        scheduling.k8s.io/pod-group: training
    spec:
      schedulerName: fluence
      containers:
        - name: worker
          image: busybox
          command: ["sleep", "3600"]
          resources:
            requests:
              cpu: "2"
              memory: 8Gi
