# Native gang scheduling (k8s >= 1.36, GangScheduling/GenericWorkload gates on).
# Fluence does placement; the PodGroup gives all-or-nothing semantics. Pods link
# to the PodGroup via the first-class field spec.schedulingGroup.podGroupName.
apiVersion: scheduling.k8s.io/v1alpha2
kind: PodGroup
metadata:
  name: training
spec:
  schedulingPolicy:
    gang:
      minCount: 2
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: training
spec:
  replicas: 2
  selector:
    matchLabels: {app: training}
  template:
    metadata:
      labels:
        app: training
    spec:
      schedulerName: fluence
      schedulingGroup:
        podGroupName: training
      containers:
        - name: worker
          image: busybox
          command: ["sleep", "3600"]
          resources:
            requests:
              cpu: "4"
              memory: 8Gi