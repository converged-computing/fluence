# One slot holding one exclusive qpu — the clean case for the probe: the graph
# has exactly one exclusive qpu, so after replay the re-match MUST be refused.
version: 9999
resources:
  - type: slot
    count: 1
    label: default
    with:
      - type: qpu
        count: 1
attributes:
  system:
    duration: 3600
tasks:
  - command: [""]
    slot: default
    count:
      per_slot: 1