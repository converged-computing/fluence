# Multi-pod gang via the WEBHOOK path (the path the experiments use
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gang3
spec:
  replicas: 2
  selector:
    matchLabels: {app: gang3}
  template:
    metadata:
      labels:
        app: gang3
        fluence.flux-framework.org/group: gang3
      annotations:
        fluence.flux-framework.org/group-size: "2"
    spec:
      schedulerName: fluence
      containers:
        - name: worker
          image: busybox
          command: ["sleep", "3600"]
          resources:
            requests:
              cpu: "1"
