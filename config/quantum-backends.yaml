# Virtual quantum resources to inject into the cluster resource graph.
# Point FLUENCE_QUANTUM_CONFIG at this file to bring up fluence with quantum.
# Each backend becomes a `qpu` vertex (name = QRMI backend id) under a qgateway.
backends:
  - name: ibm_fez
    num_qubits: 156
    vendor: ibm
    qrmi_type: qiskit-runtime-service
  - name: ibm_marrakesh
    num_qubits: 156
    vendor: ibm
    qrmi_type: qiskit-runtime-service
